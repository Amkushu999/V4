name: Build & Sign Release APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release-key.jks
          echo "Keystore decoded successfully"

      - name: Build signed release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/release-key.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Rename APK with version info
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | grep -oP '"[^"]+"' | tr -d '"')
          BUILD=$(grep 'versionCode' app/build.gradle.kts | grep -oP '[0-9]+' | head -1)
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/FACEGATE-v${VERSION}-build${BUILD}-signed.apk
          echo "APK_PATH=app/build/outputs/apk/release/FACEGATE-v${VERSION}-build${BUILD}-signed.apk" >> $GITHUB_ENV
          echo "APK_NAME=FACEGATE-v${VERSION}-build${BUILD}-signed.apk" >> $GITHUB_ENV

      - name: Upload signed APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Print APK info
        run: |
          echo "✅ Build complete!"
          echo "📦 APK: ${{ env.APK_NAME }}"
          ls -lh app/build/outputs/apk/release/*.apk
